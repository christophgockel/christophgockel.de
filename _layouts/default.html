<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="author" content="Christoph Gockel">
    <meta name="description" content="Blog and Projects">
    <meta name="viewport" content="width=device-width">
    <link rel="stylesheet" href="{{ "/assets/christophgockel.css" | relative_url }}" />
    <link rel="stylesheet" href="{{ "/assets/syntax.css" | relative_url }}">
    <link rel="alternate" type="application/atom+xml" href="/atom.xml">
    <title>{{ page.title }} — {{ site.name }}</title>
  </head>

  <body class="{{ page.collection }} bg-gray-100">
    <header class="main-content flex items-center justify-between py-8">
      {% if page.url == "/" %}
        <h1 class="title">
          <a href="/" class="logo">{{ site.name }}</a>
        </h1>
      {% else %}
        <a href="/" class="back">Back</a>
      {% endif %}

      {% if false %}
      <nav>
        <ul class="flex">
          <li class="pr-12">
            <a class="nav-link" href="https://github.com/christophgockel">Writing</a>
          </li>
          <li>
            <a class="nav-link p-0" href="https://twitter.com/christophgockel">Projects</a>
          </li>
        </ul>
      </nav>
      {% endif %}
    </header>

    <section class="main-content">
      {{ content }}
    </section>

    <footer class="main-content flex items-center justify-between py-8">
      <p>
        {% if page.url == "/" %}
          Thank you for visiting!
        {% else %}
          Thank you for reading!
        {% endif %}
        <br/>
        <span role="img" aria-label="victory hand emoji">&#x270c;&#x1f3fb;</span>
        Christoph Gockel, 2020
      </p>
      <nav>
        <ul class="flex">
          <li class="pr-12">
            <a class="nav-link" href="https://github.com/christophgockel">Github</a>
          </li>
          <li>
            <a class="nav-link p-0" href="https://twitter.com/christophgockel">Twitter</a>
          </li>
        </ul>
      </nav>
    </footer>
  </body>
</html>
